# Optional local tooling — Cloudflare dashboard can also set these.
# https://developers.cloudflare.com/pages/functions/wrangler-configuration/
name = "dj-vault"
compatibility_date = "2025-01-01"
pages_build_output_dir = "dist"

# Secrets / env (do not put API keys in this file):
#   Cloudflare Dashboard → Workers & Pages → project → Settings → Environment variables
#     YOUTUBE_API_KEY              — Encrypt; Production + Preview
#     YOUTUBE_DISCOVERY_ENABLED    — optional plain var; set false/0/off to hard-disable
#                                    YouTube Data API calls (keeps free quota / billing safe)
# Local dev: .env.local with YOUTUBE_API_KEY=... (and optional YOUTUBE_DISCOVERY_ENABLED=false)
#
# Short share links (optional):
#   1. Dashboard → Workers & Pages → KV → Create namespace (e.g. dj-vault-shares)
#   2. Pages project → Settings → Functions → KV namespace bindings
#        Variable name: SHARES  →  select the namespace (Production + Preview)
#   Without SHARES, share buttons still work via #share=… hash URLs.
