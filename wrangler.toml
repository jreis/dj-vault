# Optional local tooling — Cloudflare dashboard can also set these.
# https://developers.cloudflare.com/pages/functions/wrangler-configuration/
name = "dj-vault"
compatibility_date = "2025-01-01"
pages_build_output_dir = "dist"

# Secrets (do not put API keys in this file):
#   Cloudflare Dashboard → Workers & Pages → project → Settings →
#   Environment variables → YOUTUBE_API_KEY (Encrypt) for Production + Preview
# Local dev: .env.local with YOUTUBE_API_KEY=... (picked up by Vite middleware)
